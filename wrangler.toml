# Configuración de Cloudflare Pages para "¿Es seguro volver?"
# Un solo proyecto sirve el frontend (public/) y la API (functions/).
#
# Antes del primer despliegue real reemplaza database_id por el que te
# devuelva:  npx wrangler d1 create esv-db
name = "es-seguro-volver"
compatibility_date = "2024-11-01"
pages_build_output_dir = "public"

# --- Base de datos (SQLite serverless) ---
[[d1_databases]]
binding = "DB"
database_name = "esv-db"
database_id = "c9f6f23e-d5de-4c2b-aa1e-0c101b051b6a"

# --- Almacenamiento de fotos (objetos) ---
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "esv-fotos"

# --- Variables públicas ---
# La clave de sitio de Turnstile es pública; puedes ponerla aquí.
# El secreto (TURNSTILE_SECRET) y el token de admin (ADMIN_TOKEN) son
# secretos: configúralos con `wrangler pages secret put NOMBRE` o en el panel.
[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADr5L9moNYJPRc34"
